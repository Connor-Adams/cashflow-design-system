<!-- @dsCard group="Components" viewport="700x360" name="Data — StatCard, Table, Tabs, Avatar" subtitle="Money-aware KPIs and the data table" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 20px; background: var(--card); }
  .grid { display: flex; flex-direction: column; gap: 16px; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { StatCard, Table, TableHeader, TableBody, TableRow, TableHead, TableCell, Tabs, LetterAvatar, Badge } = window.CashflowDesignSystem_2cf89d;
  function Demo() {
    const [tab, setTab] = React.useState('all');
    const rows = [
      ['Whole Foods Market','Amex Cobalt','Groceries','-$84.20','negative'],
      ['Payroll · Acme Inc','TD Chequing','Income','+$4,900.00','positive'],
      ['Netflix','Amex Cobalt','Subscriptions','-$20.99','negative'],
    ];
    return (
      <div className="grid">
        <div className="stats">
          <StatCard label="Net spend" value="$4,210" hint="This month" delta="-8%" metricKind="spend" />
          <StatCard label="Income" value="$9,800" hint="vs last month" delta="+3%" metricKind="gain" />
          <StatCard label="Transactions" value="312" hint="In current filters" delta="+24" metricKind="neutral" />
        </div>
        <Tabs items={[{value:'all',label:'All'},{value:'biz',label:'Business'},{value:'personal',label:'Personal'}]} value={tab} onValueChange={setTab} />
        <Table>
          <TableHeader>
            <TableRow>
              <TableHead>Merchant</TableHead>
              <TableHead>Account</TableHead>
              <TableHead>Category</TableHead>
              <TableHead style={{ textAlign: 'right' }}>Amount</TableHead>
            </TableRow>
          </TableHeader>
          <TableBody>
            {rows.map(([m,a,c,amt,tone]) => (
              <TableRow key={m}>
                <TableCell><span style={{ display:'inline-flex', alignItems:'center', gap:8 }}><LetterAvatar text={m} size="sm" />{m}</span></TableCell>
                <TableCell style={{ color: 'var(--muted-foreground)' }}>{a}</TableCell>
                <TableCell><Badge variant="secondary">{c}</Badge></TableCell>
                <TableCell style={{ textAlign:'right', fontWeight:600, color: tone === 'positive' ? 'var(--positive)' : 'var(--negative)' }}>{amt}</TableCell>
              </TableRow>
            ))}
          </TableBody>
        </Table>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
