<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<style>
  body { margin: 0; padding: 20px; background: var(--card); }
  .grid { display: flex; flex-direction: column; gap: 12px; max-width: 600px; }
  .two { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
</style>

<body>
<div id="root"></div>
<script type="text/babel">
  const { Alert, EmptyState, Skeleton, SkeletonText, Button } = window.CashflowDesignSystem_2cf89d;
  function Demo() {
    return (
      <div className="grid">
        <div className="two">
          <Alert variant="error" title="Import failed">Check the CSV header row and re-upload.</Alert>
          <Alert variant="success" title="Reconciled">3 transactions matched your statement.</Alert>
          <Alert variant="warning" title="Price increased">Netflix went up $2.00 this month.</Alert>
          <Alert variant="info" title="Heads up">12 transactions are awaiting category.</Alert>
        </div>
        <EmptyState
          title="No transactions yet"
          description="Upload a CSV or PDF statement, or connect a folder scan to get started."
          actions={<Button size="sm" variant="primary">Import statement</Button>}
        />
        <div style={{ borderRadius: 'var(--radius-lg)', border: '1px solid var(--border)', background: 'var(--card)', padding: 16, display: 'flex', flexDirection: 'column', gap: 10 }}>
          <Skeleton h={14} w="40%" />
          <SkeletonText lines={3} />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
