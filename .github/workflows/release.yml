name: Release

on:
  push:
    branches: [main]

# GITHUB_TOKEN needs packages:write to publish to GitHub Packages,
# and contents/pull-requests:write for the changesets "Version Packages" PR.
permissions:
  contents: write
  packages: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # changesets needs full history to compute version bumps
      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          # Writes an .npmrc for the job that points the @connor-adams scope at
          # GitHub Packages and authenticates publishes with NODE_AUTH_TOKEN.
          registry-url: https://npm.pkg.github.com
          scope: '@connor-adams'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # When changeset files exist on main, opens/updates a "Version Packages" PR.
      # When none are pending (versions already bumped), publishes any package
      # whose version isn't yet on the registry — including the initial 0.1.0.
      - name: Version or publish
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          version: pnpm changeset version
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
