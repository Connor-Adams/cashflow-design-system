<!-- @dsCard group="Brand" viewport="700x440" name="Theme preview — light / dark" subtitle="Toggle the whole token layer; open standalone for the full gallery" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cashflow — theme preview</title>
<link rel="stylesheet" href="styles.css" />
<link rel="icon" href="assets/logo/favicon.ico" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="_ds_bundle.js"></script>
<style>
  html, body { margin: 0; }
  body { background: var(--background); color: var(--foreground); font-family: var(--font-sans); }
  .wrap { max-width: 980px; margin: 0 auto; padding: 22px; }
  .bar { display: flex; align-items: center; gap: 14px; position: sticky; top: 0; z-index: 10;
    padding: 14px 22px; background: color-mix(in oklch, var(--card) 90%, transparent);
    backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
  .bar h1 { margin: 0; font-size: 17px; font-weight: 700; letter-spacing: -0.01em; }
  .brand { display: flex; align-items: center; gap: 10px; }
  .seg { margin-left: auto; display: inline-flex; gap: 4px; padding: 4px; border-radius: var(--radius-lg);
    border: 1px solid var(--border); background: color-mix(in oklch, var(--muted) 40%, transparent); }
  .seg button { border: none; cursor: pointer; font-family: var(--font-sans); font-size: 13px; font-weight: 600;
    padding: 7px 16px; border-radius: var(--radius-md); background: transparent; color: var(--muted-foreground); display: inline-flex; align-items: center; gap: 6px; }
  .seg button[aria-pressed="true"] { background: var(--card); color: var(--foreground); box-shadow: var(--shadow); }
  h2.sec { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
    color: var(--muted-foreground); margin: 28px 0 12px; }
  .swatches { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .sw { border-radius: var(--radius-md); border: 1px solid var(--border); overflow: hidden; }
  .sw .chip { height: 48px; }
  .sw .nm { font-size: 10px; font-family: var(--font-mono); color: var(--muted-foreground); padding: 5px 7px; background: var(--card); }
  .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  /* Tweaks panel */
  .tpanel { position: fixed; top: 78px; right: 18px; z-index: 60; width: 256px;
    border-radius: var(--radius-xl); border: 1px solid var(--border); background: var(--card);
    box-shadow: 0 18px 44px rgb(9 9 11 / .22); overflow: hidden; }
  .tpanel header { display: flex; align-items: center; gap: 8px; padding: 12px 14px;
    border-bottom: 1px solid var(--border); }
  .tpanel header b { font-size: 13px; font-weight: 700; letter-spacing: -.01em; }
  .tpanel header .x { margin-left: auto; width: 26px; height: 26px; display: inline-flex;
    align-items: center; justify-content: center; border-radius: var(--radius-md); border: 1px solid var(--border);
    background: transparent; color: var(--muted-foreground); cursor: pointer; font-size: 14px; line-height: 1; }
  .tpanel .body { padding: 12px 14px; display: flex; flex-direction: column; gap: 14px; }
  .tweak { display: grid; gap: 6px; }
  .tweak > span { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--muted-foreground); }
  .tfab { position: fixed; bottom: 20px; right: 20px; z-index: 60; display: inline-flex; align-items: center; gap: 8px;
    border-radius: var(--radius-full); border: 1px solid transparent; padding: 11px 18px; cursor: pointer;
    font-family: var(--font-sans); font-size: 13px; font-weight: 700; color: var(--primary-foreground);
    background: var(--primary); box-shadow: 0 10px 26px rgb(9 9 11 / .26); }

  /* Custom dropdown (entirely custom — no native <select>) */
  .cs { position: relative; }
  .cs-trigger { display: flex; align-items: center; gap: 8px; width: 100%; height: 38px;
    border-radius: var(--radius-md); border: 1px solid var(--input); background: color-mix(in oklch, var(--background) 70%, transparent);
    padding: 0 10px; font-family: var(--font-sans); font-size: 14px; font-weight: 600; color: var(--foreground);
    cursor: pointer; transition: border-color 150ms, box-shadow 150ms; }
  .cs-trigger:hover { border-color: color-mix(in oklch, var(--ring) 50%, var(--input)); }
  .cs-trigger[aria-expanded="true"] { border-color: var(--ring); box-shadow: 0 0 0 3px color-mix(in oklch, var(--ring) 32%, transparent); }
  .cs-trigger .lbl { flex: 1; text-align: left; }
  .cs-trigger .chev { transition: transform 160ms ease; color: var(--muted-foreground); font-size: 11px; }
  .cs-trigger[aria-expanded="true"] .chev { transform: rotate(180deg); }
  .cs-menu { position: absolute; top: calc(100% + 6px); left: 0; right: 0; z-index: 70; margin: 0; padding: 4px; list-style: none;
    border-radius: var(--radius-md); border: 1px solid var(--border); background: var(--popover); box-shadow: 0 16px 36px rgb(9 9 11 / .24); }
  .cs-opt { display: flex; align-items: center; gap: 9px; padding: 8px 9px; border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 600; color: var(--foreground); cursor: pointer; }
  .cs-opt:hover { background: var(--muted); }
  .cs-opt[aria-selected="true"] { background: color-mix(in oklch, var(--primary) 14%, transparent); }
  .cs-opt .sw { width: 14px; height: 14px; border-radius: 4px; border: 1px solid color-mix(in oklch, var(--foreground) 18%, transparent); flex-shrink: 0; }
  .cs-opt .ck { margin-left: auto; color: var(--primary); font-size: 12px; font-weight: 800; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const NS = window.CashflowDesignSystem_2cf89d;
const { Button, Badge, Card, CardHeader, CardTitle, CardDescription, CardContent,
  Label, Input, NativeSelect, Alert, EmptyState, Skeleton, SkeletonText,
  StatCard, Table, TableHeader, TableBody, TableRow, TableHead, TableCell, Tabs, LetterAvatar } = NS;

const CAT_ICONS = {
  Groceries: (<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="8" cy="21" r="1" /><circle cx="19" cy="21" r="1" /><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12" /></svg>),
  Income: (<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 7 13.5 15.5l-5-5L2 17" /><path d="M16 7h6v6" /></svg>),
  Subscriptions: (<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m17 2 4 4-4 4" /><path d="M3 11v-1a4 4 0 0 1 4-4h14" /><path d="m7 22-4-4 4-4" /><path d="M21 13v1a4 4 0 0 1-4 4H3" /></svg>),
};

function TxnTable() {
  const rows = [
    { m: 'Whole Foods Market', c: 'Groceries', a: '-$84.20', t: 'neg', n: -84.20 },
    { m: 'Payroll \u00b7 Northwind', c: 'Income', a: '+$4,900.00', t: 'pos', n: 4900 },
    { m: 'Netflix', c: 'Subscriptions', a: '-$20.99', t: 'neg', n: -20.99 },
  ];
  const [sort, setSort] = React.useState(null);
  const cycle = (key) => setSort((s) => (!s || s.key !== key ? { key, dir: 'asc' } : s.dir === 'asc' ? { key, dir: 'desc' } : null));
  let data = rows.slice();
  if (sort) {
    const get = (r) => (sort.key === 'amount' ? r.n : sort.key === 'merchant' ? r.m.toLowerCase() : r.c.toLowerCase());
    data.sort((x, y) => { const a = get(x), b = get(y); return (a < b ? -1 : a > b ? 1 : 0) * (sort.dir === 'asc' ? 1 : -1); });
  }
  const arrow = (key) => (sort && sort.key === key ? (sort.dir === 'asc' ? ' \u25B4' : ' \u25BE') : '');
  const hStyle = { cursor: 'pointer', userSelect: 'none' };
  return (
    <Table>
      <TableHeader><TableRow>
        <TableHead style={hStyle} onClick={() => cycle('merchant')}>Merchant{arrow('merchant')}</TableHead>
        <TableHead style={hStyle} onClick={() => cycle('category')}>Category{arrow('category')}</TableHead>
        <TableHead style={{ textAlign: 'right', ...hStyle }} onClick={() => cycle('amount')}>Amount{arrow('amount')}</TableHead>
      </TableRow></TableHeader>
      <TableBody>
        {data.map((r) => (
          <TableRow key={r.m}>
            <TableCell><span style={{ display: 'inline-flex', alignItems: 'center', gap: 8 }}><LetterAvatar text={r.m} size="sm" />{r.m}</span></TableCell>
            <TableCell><Badge variant="secondary"><span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>{CAT_ICONS[r.c]}{r.c}</span></Badge></TableCell>
            <TableCell style={{ textAlign: 'right', fontWeight: 700, fontFamily: 'var(--font-mono)', color: r.t === 'pos' ? 'var(--positive)' : 'var(--negative)' }}>{r.a}</TableCell>
          </TableRow>
        ))}
      </TableBody>
    </Table>
  );
}

const SURFACES = ['--background', '--card', '--muted', '--foreground', '--muted-foreground', '--border', '--primary'];
const SIGNALS = ['--positive', '--negative', '--success', '--warning', '--danger', '--info'];

/* Entirely custom dropdown — a real listbox, not a native <select>. */
function CustomSelect({ value, options, onChange, ariaLabel }) {
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);
  React.useEffect(() => {
    function onDoc(e) {if (ref.current && !ref.current.contains(e.target)) setOpen(false);}
    function onKey(e) {if (e.key === 'Escape') setOpen(false);}
    document.addEventListener('mousedown', onDoc);
    document.addEventListener('keydown', onKey);
    return () => {document.removeEventListener('mousedown', onDoc);document.removeEventListener('keydown', onKey);};
  }, []);
  const sel = options.find((o) => o.value === value) || options[0];
  return (
    <div className="cs" ref={ref}>
        <button type="button" className="cs-trigger" aria-haspopup="listbox" aria-expanded={open} aria-label={ariaLabel} onClick={() => setOpen((o) => !o)}>
          {sel.swatch && <span className="sw" style={{ background: sel.swatch }} />}
          <span className="lbl">{sel.label}</span>
          <span className="chev">▾</span>
        </button>
        {open &&
      <ul className="cs-menu" role="listbox" aria-label={ariaLabel}>
            {options.map((o) =>
        <li key={o.value} className="cs-opt" role="option" aria-selected={o.value === value}
        onClick={() => {onChange(o.value);setOpen(false);}}>
                {o.swatch && <span className="sw" style={{ background: o.swatch }} />}
                <span>{o.label}</span>
                {o.value === value && <span className="ck">✓</span>}
              </li>
        )}
          </ul>
      }
      </div>);

}

const PRIMARY_OPTS = [
{ value: 'oxblood', label: 'Oxblood', swatch: '#9B2D3A', hover: '#82252F' },
{ value: 'steel', label: 'Steel blue', swatch: '#2A6FDB', hover: '#225BB4' },
{ value: 'forest', label: 'Forest green', swatch: '#0A875D', hover: '#086F4C' },
{ value: 'plum', label: 'Plum', swatch: '#7C3AED', hover: '#6A2FCC' }];

const RADIUS_OPTS = [
{ value: 'sharp', label: 'Sharp (2px)', r: '2px' },
{ value: 'default', label: 'Default (8px)', r: '0.5rem' },
{ value: 'round', label: 'Rounded (14px)', r: '14px' }];

const FONT_OPTS = [
{ value: 'mulish', label: 'Mulish', f: "'Mulish','Avenir Next',sans-serif" },
{ value: 'plex', label: 'IBM Plex Sans', f: "'IBM Plex Sans',system-ui,sans-serif" },
{ value: 'system', label: 'System UI', f: "system-ui,-apple-system,sans-serif" }];

const THEME_OPTS = [{ value: 'light', label: '☀ Light' }, { value: 'dark', label: '☾ Dark' }];

const TWEAK_DEFAULTS = { theme: 'dark', primary: 'oxblood', radius: 'default', font: 'mulish' };
function loadTweaks() {
  try {return { ...TWEAK_DEFAULTS, ...JSON.parse(localStorage.getItem('cf-preview-tweaks') || '{}') };}
  catch (e) {return { ...TWEAK_DEFAULTS };}
}

function TweaksPanel({ tw, set, onClose }) {
  return (
    <div className="tpanel" role="dialog" aria-label="Tweaks">
        <header>
          <b>Tweaks</b>
          <button type="button" className="x" aria-label="Close tweaks" onClick={onClose}>✕</button>
        </header>
        <div className="body">
          <label className="tweak"><span>Theme</span>
            <CustomSelect ariaLabel="Theme" value={tw.theme} options={THEME_OPTS} onChange={(v) => set('theme', v)} /></label>
          <label className="tweak"><span>Brand primary</span>
            <CustomSelect ariaLabel="Brand primary" value={tw.primary} options={PRIMARY_OPTS} onChange={(v) => set('primary', v)} /></label>
          <label className="tweak"><span>Corner radius</span>
            <CustomSelect ariaLabel="Corner radius" value={tw.radius} options={RADIUS_OPTS} onChange={(v) => set('radius', v)} /></label>
          <label className="tweak"><span>Typeface</span>
            <CustomSelect ariaLabel="Typeface" value={tw.font} options={FONT_OPTS} onChange={(v) => set('font', v)} /></label>
        </div>
      </div>);

}

function Swatch({ token }) {
  return (
    <div className="sw">
        <div className="chip" style={{ background: `var(${token})` }} />
        <div className="nm">{token}</div>
      </div>);

}

function Preview() {
  const [tab, setTab] = React.useState('all');
  const [panelOpen, setPanelOpen] = React.useState(true);
  const [tw, setTw] = React.useState(loadTweaks);
  const setTweak = (k, v) => setTw((p) => ({ ...p, [k]: v }));
  const theme = tw.theme;

  React.useEffect(() => {
    const root = document.documentElement;
    root.setAttribute('data-theme', tw.theme);
    const p = PRIMARY_OPTS.find((o) => o.value === tw.primary) || PRIMARY_OPTS[0];
    root.style.setProperty('--primary', p.swatch);
    root.style.setProperty('--primary-hover', p.hover);
    root.style.setProperty('--ring', p.swatch);
    const r = RADIUS_OPTS.find((o) => o.value === tw.radius) || RADIUS_OPTS[1];
    root.style.setProperty('--radius', r.r);
    root.style.setProperty('--radius-lg', r.r);
    const f = FONT_OPTS.find((o) => o.value === tw.font) || FONT_OPTS[0];
    root.style.setProperty('--font-sans', f.f);
    try {localStorage.setItem('cf-preview-tweaks', JSON.stringify(tw));} catch (e) {}
  }, [tw]);

  return (
    <div>
        <div className="bar">
          <div className="brand">
            <img src="assets/logo/cashflow-mark-192.png" alt="" width="30" height="30" style={{ borderRadius: 8 }} />
            <h1>Cashflow — theme preview</h1>
          </div>
          <div className="seg" role="group" aria-label="Theme">
            <button aria-pressed={theme === 'light'} onClick={() => setTweak('theme', 'light')}>☀ Light</button>
            <button aria-pressed={theme === 'dark'} onClick={() => setTweak('theme', 'dark')}>☾ Dark</button>
          </div>
        </div>

        {panelOpen ?
      <TweaksPanel tw={tw} set={setTweak} onClose={() => setPanelOpen(false)} /> :
      <button type="button" className="tfab" onClick={() => setPanelOpen(true)}>⚙ Tweaks</button>}

        <div className="wrap">
          <h2 className="sec">Surfaces & text</h2>
          <div className="swatches">{SURFACES.map((t) => <Swatch key={t} token={t} />)}</div>

          <h2 className="sec">Semantic signals</h2>
          <div className="swatches">{SIGNALS.map((t) => <Swatch key={t} token={t} />)}</div>

          <h2 className="sec">Buttons & badges</h2>
          <div className="row" style={{ marginBottom: 12 }}>
            <Button variant="primary">Add transaction</Button>
            <Button variant="secondary">Cancel</Button>
            <Button variant="outline">Filter</Button>
            <Button variant="ghost">Skip</Button>
            <Button variant="destructive">Delete</Button>
          </div>
          <div className="row">
            <Badge>Active</Badge>
            <Badge variant="secondary">CAD</Badge>
            <Badge variant="success">Reconciled</Badge>
            <Badge variant="outline">Pending</Badge>
            <Badge variant="count">12</Badge>
          </div>

          <h2 className="sec">Stat cards · money semantics</h2>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 12 }}>
            <StatCard label="Net spend" value="$4,212" hint="This month" delta="-8%" metricKind="spend" />
            <StatCard label="Income" value="$9,840" hint="vs last month" delta="+3%" metricKind="gain" />
            <StatCard label="Transactions" value="312" hint="Current filters" delta="+24" metricKind="neutral" />
          </div>

          <h2 className="sec">Forms & feedback</h2>
          <div className="grid2">
            <div style={{ display: 'grid', gap: 12 }}>
              <Label>Merchant<Input placeholder="Whole Foods Market" /></Label>
              <Label>Currency<NativeSelect options={['CAD', 'USD', 'EUR']} /></Label>
              <Label>Invalid<Input invalid defaultValue="not-an-amount" /></Label>
            </div>
            <div style={{ display: 'grid', gap: 10 }}>
              <Alert variant="error" title="Import failed">Check the CSV header row.</Alert>
              <Alert variant="success" title="Reconciled">3 transactions matched.</Alert>
              <Card><CardHeader><CardTitle>Net worth</CardTitle><CardDescription>Across all accounts</CardDescription></CardHeader><CardContent style={{ fontSize: '1.4rem', fontWeight: 700 }}>$184,320</CardContent></Card>
            </div>
          </div>

          <h2 className="sec">Tabs & table</h2>
          <Tabs items={[{ value: 'all', label: 'All' }, { value: 'biz', label: 'Business' }, { value: 'personal', label: 'Personal' }]} value={tab} onValueChange={setTab} />
          <div style={{ height: 12 }} />
          <TxnTable />

          <h2 className="sec">Loading & empty</h2>
          <div className="grid2" style={{ marginBottom: 28 }}>
            <div style={{ borderRadius: 'var(--radius-lg)', border: '1px solid var(--border)', background: 'var(--card)', padding: 16, display: 'flex', flexDirection: 'column', gap: 10 }}>
              <Skeleton h={14} w="40%" /><SkeletonText lines={3} />
            </div>
            <EmptyState title="No transactions yet" description="Upload a CSV or PDF statement to get started." actions={<Button size="sm" variant="primary">Import</Button>} />
          </div>
        </div>
      </div>);

}
ReactDOM.createRoot(document.getElementById('root')).render(<Preview />);
</script>
</body>
</html>
