<!-- @dsCard group="Components" viewport="700x200" name="ToggleGroup" subtitle="Segmented control — single & multiple select" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 20px; background: var(--card); font-family: var(--font-sans); }
  .wrap { display: flex; flex-direction: column; gap: 16px; }
  .row { display: flex; flex-wrap: wrap; align-items: center; gap: 14px; }
  .cap { font-size: var(--text-label); text-transform: uppercase; letter-spacing: .06em; font-weight: 600; color: var(--muted-foreground); margin: 0 0 6px; }
  .stack { display: flex; flex-direction: column; gap: 4px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { ToggleGroup, Text } = window.CashflowDesignSystem_2cf89d;
  function Demo() {
    const [range, setRange] = React.useState("month");
    return (
      <div className="wrap">
        <div className="stack">
          <Text variant="label" tone="muted">Single — timeframe</Text>
          <div><ToggleGroup type="single" value={range} onValueChange={setRange} items={[
            { value: 'week', label: 'Week' },
            { value: 'month', label: 'Month' },
            { value: 'year', label: 'Year' },
          ]} /></div>
        </div>
        <div className="stack">
          <Text variant="label" tone="muted">Multiple — account filters</Text>
          <div><ToggleGroup type="multiple" defaultValue={['cobalt']} size="sm" items={[
            { value: 'cobalt', label: 'Amex Cobalt' },
            { value: 'chequing', label: 'TD Chequing' },
            { value: 'wealthsimple', label: 'Wealthsimple' },
          ]} /></div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
