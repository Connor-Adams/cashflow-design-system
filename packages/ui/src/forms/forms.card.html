<!-- @dsCard group="Components" viewport="700x420" name="Forms — Input, Select, Toggles" subtitle="36px fields, oxblood focus ring, switch / checkbox / radio" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 20px; background: var(--card); }
  .grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 16px; max-width: 560px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Label, Input, Textarea, NativeSelect, Switch, Checkbox, RadioGroup } = window.CashflowDesignSystem_2cf89d;
  function Demo() {
    return (
      <div className="grid">
        <Label>Merchant<Input placeholder="Whole Foods Market" /></Label>
        <Label>Currency<NativeSelect options={['CAD','USD','EUR','GBP']} /></Label>
        <Label>Amount<Input defaultValue="84.20" /></Label>
        <Label>Account<NativeSelect options={['Amex Cobalt','TD Chequing','Wealthsimple']} /></Label>
        <Label style={{ gridColumn: '1 / -1' }}>Note<Textarea placeholder="Optional note, receipt detail, or split reason…" /></Label>
        <Label>Invalid field<Input invalid defaultValue="not-an-amount" /></Label>
        <Label>Disabled<Input disabled defaultValue="Locked" /></Label>
        <div style={{ gridColumn: '1 / -1', display: 'flex', alignItems: 'flex-start', gap: 40, paddingTop: 4, borderTop: '1px solid var(--border)', marginTop: 4 }}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            <span style={{ display: 'inline-flex', alignItems: 'center', gap: 10, fontSize: 'var(--text-body)' }}><Switch defaultChecked /> Auto-reconcile</span>
            <span style={{ display: 'inline-flex', alignItems: 'center', gap: 10, fontSize: 'var(--text-body)' }}><Switch /> Email receipts</span>
            <span style={{ display: 'inline-flex', alignItems: 'center', gap: 10, fontSize: 'var(--text-body)' }}><Checkbox defaultChecked /> Business expense</span>
            <span style={{ display: 'inline-flex', alignItems: 'center', gap: 10, fontSize: 'var(--text-body)' }}><Checkbox indeterminate /> Select all rows</span>
          </div>
          <RadioGroup options={['Chequing','Savings','Credit']} defaultValue="Chequing" />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
