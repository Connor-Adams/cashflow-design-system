<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<style>
  body { margin: 0; padding: 20px; background: var(--card); font-family: var(--font-sans); }
  .wrap { display: flex; flex-direction: column; gap: 18px; }
  .row { display: flex; flex-wrap: wrap; align-items: center; gap: 18px; }
  .cap { font-size: var(--text-label); text-transform: uppercase; letter-spacing: .06em; font-weight: 600; color: var(--muted-foreground); margin: 0 0 8px; }
  .grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 18px; }
</style>

<body>
<div id="root"></div>
<script type="text/babel">
  const { BrandLogo, brandNames } = window.CashflowDesignSystem_2cf89d;
  function Demo() {
    return (
      <div className="wrap">
        <div>
          <p className="cap">Official brand color</p>
          <div className="row">
            <BrandLogo name="spotify" size={34} brand />
            <BrandLogo name="netflix" size={34} brand />
            <BrandLogo name="visa" size={34} brand />
            <BrandLogo name="paypal" size={34} brand />
            <BrandLogo name="cash-app" size={34} brand />
            <BrandLogo name="starbucks" size={34} brand />
            <BrandLogo name="youtube" size={34} brand />
          </div>
        </div>
        <div>
          <p className="cap">Monochrome (currentColor)</p>
          <div className="row" style={{ color: 'var(--foreground)' }}>
            {brandNames.map((name) => <BrandLogo key={name} name={name} size={26} />)}
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
