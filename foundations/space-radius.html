<!-- @dsCard group="Spacing" viewport="700x150" name="Corner radius" subtitle="base 0.5rem · cards & buttons default rounded-lg (8px)" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:22px;background:var(--card);font-family:var(--font-sans)}
  .row{display:flex;gap:18px;align-items:flex-end}
  .item{display:flex;flex-direction:column;gap:8px;align-items:center}
  .box{width:84px;height:64px;background:color-mix(in oklch,var(--primary) 12%,transparent);border:1px solid color-mix(in oklch,var(--primary) 40%,var(--border))}
  .t{font-size:11px;font-family:var(--font-mono);color:var(--muted-foreground)}
  .t b{color:var(--foreground)}
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="t"><b>sm</b> 2px</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><span class="t"><b>md</b> 4px</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="t"><b>lg</b> 8px ·default</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="t"><b>xl</b> 12px</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-full);width:64px"></div><span class="t"><b>full</b> pill</span></div>
  </div>
</body></html>
