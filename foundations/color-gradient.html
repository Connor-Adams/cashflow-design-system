<!-- @dsCard group="Colors" viewport="700x160" name="Hero gradient" subtitle="Warm orange → pink: the one moment of warmth, low-opacity only" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:20px;background:var(--card);font-family:var(--font-sans)}
  .full{height:56px;border-radius:var(--radius-lg);background:var(--gradient-hero)}
  .row{display:flex;gap:12px;margin-top:12px}
  .tile{flex:1;height:48px;border-radius:var(--radius-md);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--foreground)}
  .meta{margin-top:12px;font-size:12px;color:var(--muted-foreground)}
  .meta b{color:var(--foreground)}
</style></head>
<body>
  <div class="full"></div>
  <div class="row">
    <div class="tile" style="background:linear-gradient(135deg,color-mix(in oklch,var(--gradient-hero-from) 16%,transparent),color-mix(in oklch,var(--gradient-hero-to) 16%,transparent))">active nav 16%</div>
    <div class="tile" style="background:linear-gradient(135deg,color-mix(in oklch,var(--gradient-hero-from) 11%,transparent),color-mix(in oklch,var(--gradient-hero-to) 11%,transparent))">tree hover 11%</div>
    <div class="tile skeleton-shimmer">skeleton 22%</div>
  </div>
  <div class="meta"><b>--gradient-hero</b> linear-gradient(135deg, #FF7847, #E84393) — used at 11–24% opacity, never a flat fill</div>
</body></html>
