<!-- @dsCard group="Colors" viewport="700x150" name="Semantic signals" subtitle="success · warning · danger · info — tinted bg + border" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:20px;background:var(--card);font-family:var(--font-sans)}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .tile{border-radius:var(--radius-lg);padding:14px;display:flex;flex-direction:column;gap:6px;border:1px solid}
  .lab{font-size:13px;font-weight:700}
  .v{font-size:11px;font-family:var(--font-mono);opacity:.8}
</style></head>
<body>
  <div class="row">
    <div class="tile" style="background:color-mix(in srgb,var(--success) 11%,transparent);border-color:color-mix(in srgb,var(--success) 44%,var(--border));color:var(--success-foreground)">
      <span class="lab" style="color:var(--success)">Success</span><span>Reconciled</span><span class="v">--success</span></div>
    <div class="tile" style="background:color-mix(in srgb,var(--warning) 12%,transparent);border-color:color-mix(in srgb,var(--warning) 45%,var(--border));color:var(--warning-foreground)">
      <span class="lab" style="color:var(--warning)">Warning</span><span>Caution</span><span class="v">--warning</span></div>
    <div class="tile" style="background:color-mix(in srgb,var(--danger) 11%,transparent);border-color:color-mix(in srgb,var(--danger) 44%,var(--border));color:var(--danger-foreground)">
      <span class="lab" style="color:var(--danger)">Danger</span><span>Error banner</span><span class="v">--danger</span></div>
    <div class="tile" style="background:color-mix(in srgb,var(--info) 11%,transparent);border-color:color-mix(in srgb,var(--info) 44%,var(--border));color:var(--info-foreground)">
      <span class="lab" style="color:var(--info)">Info</span><span>Heads up</span><span class="v">--info</span></div>
  </div>
</body></html>
