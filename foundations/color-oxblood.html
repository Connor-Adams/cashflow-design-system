<!-- @dsCard group="Colors" viewport="700x150" name="Oxblood — brand ramp" subtitle="Signature wine-red: brand, CTA, money-out, danger-adjacent" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:20px;background:var(--card);font-family:var(--font-sans)}
  .ramp{display:flex;border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--border)}
  .sw{flex:1;height:84px;display:flex;align-items:flex-end;padding:6px;font-size:11px;font-weight:600}
  .meta{display:flex;justify-content:space-between;margin-top:10px;font-size:12px;color:var(--muted-foreground)}
  .meta b{color:var(--foreground)}
</style></head>
<body>
  <div class="ramp">
    <div class="sw" style="background:var(--oxblood-50);color:#661C26">50</div>
    <div class="sw" style="background:var(--oxblood-100);color:#661C26">100</div>
    <div class="sw" style="background:var(--oxblood-200);color:#661C26">200</div>
    <div class="sw" style="background:var(--oxblood-300);color:#2E0C10">300</div>
    <div class="sw" style="background:var(--oxblood-400);color:#fff">400</div>
    <div class="sw" style="background:var(--oxblood-500);color:#fff">500</div>
    <div class="sw" style="background:var(--oxblood-600);color:#fff">600</div>
    <div class="sw" style="background:var(--oxblood-700);color:#fff">700</div>
    <div class="sw" style="background:var(--oxblood-800);color:#fff">800</div>
    <div class="sw" style="background:var(--oxblood-900);color:#fff">900</div>
  </div>
  <div class="meta"><span><b>--oxblood-500</b> #9B2D3A · the primary</span><span>Precious — brand / CTA only, never paint surfaces</span></div>
</body></html>
