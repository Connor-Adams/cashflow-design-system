<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing ladder" subtitle="Tailwind 4px scale — card gaps, grid gaps, list rows" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:22px;background:var(--card);font-family:var(--font-sans)}
  .r{display:flex;align-items:center;gap:14px;padding:3px 0}
  .bar{height:14px;background:var(--gradient-hero);border-radius:3px}
  .t{font-size:11px;font-family:var(--font-mono);color:var(--muted-foreground);width:120px}
  .t b{color:var(--foreground)}
</style></head>
<body>
  <div class="r"><span class="t"><b>1</b> 4px</span><div class="bar" style="width:4px"></div></div>
  <div class="r"><span class="t"><b>2</b> 8px</span><div class="bar" style="width:8px"></div></div>
  <div class="r"><span class="t"><b>3</b> 12px ·rows</span><div class="bar" style="width:12px"></div></div>
  <div class="r"><span class="t"><b>4</b> 16px ·cards</span><div class="bar" style="width:16px"></div></div>
  <div class="r"><span class="t"><b>5</b> 20px</span><div class="bar" style="width:20px"></div></div>
  <div class="r"><span class="t"><b>6</b> 24px</span><div class="bar" style="width:24px"></div></div>
  <div class="r"><span class="t"><b>8</b> 32px</span><div class="bar" style="width:32px"></div></div>
</body></html>
