<!-- @dsCard group="Type" viewport="700x180" name="Typeface — Mulish" subtitle="Avenir Next substitute · geometric-humanist sans" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:22px;background:var(--card);font-family:var(--font-sans);color:var(--foreground)}
  .big{font-size:54px;font-weight:700;letter-spacing:-.02em;line-height:1}
  .alpha{font-size:20px;margin-top:14px;letter-spacing:.01em}
  .weights{display:flex;gap:18px;margin-top:14px;font-size:18px}
  .meta{margin-top:16px;font-size:12px;color:var(--muted-foreground)}
  .meta b{color:var(--foreground)}
</style></head>
<body>
  <div class="big">Cashflow</div>
  <div class="alpha">ABCDEFGHIJKLMNOPQRSTUVWXYZ&nbsp; abcdefghijklmnopqrstuvwxyz&nbsp; 0123456789 $€£</div>
  <div class="weights">
    <span style="font-weight:400">Regular 400</span>
    <span style="font-weight:500">Medium 500</span>
    <span style="font-weight:600">Semibold 600</span>
    <span style="font-weight:700">Bold 700</span>
  </div>
  <div class="meta"><b>--font-sans</b> ‘Mulish’ → Avenir Next, Segoe UI Variable, IBM Plex Sans · base 1.45 line-height, antialiased. <b>Substitution flagged</b> — Avenir Next is proprietary.</div>
</body></html>
