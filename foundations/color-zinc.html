<!-- @dsCard group="Colors" viewport="700x150" name="Zinc — neutral ramp" subtitle="The greyscale workhorse: most surfaces, borders, text" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:20px;background:var(--card);font-family:var(--font-sans)}
  .ramp{display:flex;border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--border)}
  .sw{flex:1;height:84px;display:flex;align-items:flex-end;padding:6px;font-size:11px;font-weight:600}
  .meta{display:flex;justify-content:space-between;margin-top:10px;font-size:12px;color:var(--muted-foreground)}
  .meta b{color:var(--foreground)}
</style></head>
<body>
  <div class="ramp">
    <div class="sw" style="background:var(--zinc-50);color:#18181B">50</div>
    <div class="sw" style="background:var(--zinc-100);color:#18181B">100</div>
    <div class="sw" style="background:var(--zinc-200);color:#18181B">200</div>
    <div class="sw" style="background:var(--zinc-300);color:#18181B">300</div>
    <div class="sw" style="background:var(--zinc-400);color:#18181B">400</div>
    <div class="sw" style="background:var(--zinc-500);color:#fff">500</div>
    <div class="sw" style="background:var(--zinc-600);color:#fff">600</div>
    <div class="sw" style="background:var(--zinc-700);color:#fff">700</div>
    <div class="sw" style="background:var(--zinc-800);color:#fff">800</div>
    <div class="sw" style="background:var(--zinc-900);color:#fff">900</div>
    <div class="sw" style="background:var(--zinc-950);color:#fff">950</div>
  </div>
  <div class="meta"><span><b>--zinc-*</b> · greyscale by default</span><span>Color only where it carries meaning</span></div>
</body></html>
