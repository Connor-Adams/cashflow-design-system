<!-- @dsCard group="Type" viewport="700x230" name="Display & headline scale" subtitle="display-lg → headline-sm, tight negative tracking" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:22px;background:var(--card);font-family:var(--font-sans);color:var(--foreground)}
  .r{display:flex;align-items:baseline;gap:16px;padding:5px 0}
  .r .t{font-weight:600;color:var(--muted-foreground);font-size:11px;font-family:var(--font-mono);width:130px;flex-shrink:0}
  .l{line-height:1.05}
</style></head>
<body>
  <div class="r"><span class="t">display-lg · 52</span><span class="l" style="font-size:var(--text-display-lg);letter-spacing:var(--text-display-lg-ls);font-weight:700">Net worth</span></div>
  <div class="r"><span class="t">display · 36</span><span class="l" style="font-size:var(--text-display);letter-spacing:var(--text-display-ls);font-weight:700">Net worth</span></div>
  <div class="r"><span class="t">headline-lg · 30</span><span class="l" style="font-size:var(--text-headline-lg);letter-spacing:var(--text-headline-lg-ls);font-weight:600">This period at a glance</span></div>
  <div class="r"><span class="t">headline · 24</span><span class="l" style="font-size:var(--text-headline);letter-spacing:var(--text-headline-ls);font-weight:600">This period at a glance</span></div>
  <div class="r"><span class="t">headline-sm · 16</span><span class="l" style="font-size:var(--text-headline-sm);font-weight:600">Section title</span></div>
</body></html>
